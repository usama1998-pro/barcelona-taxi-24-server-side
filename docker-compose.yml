networks:
  taxi-booking:
    external: true
    name: taxi-booking

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    networks:
      - taxi-booking
    environment:
      TZ: Europe/Madrid
      MYSQL_DATABASE: ${DATABASE_NAME:-taxi_booking}
      MYSQL_USER: ${DATABASE_USER:-taxi}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-taxi}
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD:-taxi_root}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - '${DATABASE_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      # Hostinger-like limits: max_connections_per_hour=500 on user `taxi`
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          '127.0.0.1',
          '-uroot',
          '-p$$MYSQL_ROOT_PASSWORD',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  mysql_data:
